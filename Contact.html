        <main class="container my-5">
            <h2>Order Form</h2>
            <form>
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="item" class="form-label">Select Item</label>
                    <select class="form-select" id="item" required>
                        <option value="">Choose an item</option>
                        <option value="cake"> Chocolate Fudge Cake</option>
                        <option value="redvelvet"> Red Velvet Cake</option>
                        <option value="carrot"> Carrot Cake</option>
                        <option value="cupcake"> Vanilla Cupcake</option>
                        <option value="chocolate"> Chocolate Cupcake</option>
                        <option value="strawberry"> Strawberry Cupcake</option>
                        <option value="croissant"> Croissant</option>
                        <option value="muffin"> Muffin</option>
                        <option value="donut"> Donut</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Special Requests</label>
                    <textarea class="form-control" id="message" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-dark">Submit Order</button>
            </form>
